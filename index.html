<!DOCTYPE html>
<html>

<body>
    

    <script>
        fetch('url.txt?t=' + Date.now())
            .then(response => response.text())
            .then(text => {
                const urls = text
                    .split('\n')
                    .map(url => url.trim())
                    .filter(url => url.length > 0);

                if (urls.length === 0) {
                    document.body.innerHTML = '<p>No URLs configured.</p>';
                    return;
                }

                const randomUrl =
                    urls[Math.floor(Math.random() * urls.length)];

                window.location.replace(randomUrl);
            })
            .catch(error => {
                document.body.innerHTML =
                    '<p>Error loading destinations.</p>';
                console.error(error);
            });
    </script>
</body>
</html>
