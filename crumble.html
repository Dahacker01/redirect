<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$25 Crumbl Gift Card Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff6b6b,#ff9f43,#feca57);
    overflow:hidden;
}

.container{
    background:white;
    padding:50px;
    border-radius:25px;
    text-align:center;
    max-width:700px;
    width:90%;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
    animation:pop .8s ease;
}

@keyframes pop{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.emoji{
    font-size:5rem;
    margin-bottom:15px;
}

h1{
    font-size:3rem;
    color:#222;
    margin-bottom:15px;
}

.reward{
    font-size:4rem;
    font-weight:700;
    color:#ff6b6b;
    margin:20px 0;
}

.message{
    font-size:1.3rem;
    color:#555;
    margin-bottom:30px;
}

.phone{
    display:inline-block;
    background:#ff6b6b;
    color:white;
    padding:18px 35px;
    border-radius:50px;
    font-size:2rem;
    font-weight:700;
    text-decoration:none;
    transition:.3s;
}

.phone:hover{
    background:#ff5252;
    transform:translateY(-3px);
}

.note{
    margin-top:25px;
    color:#777;
    font-size:.95rem;
}
</style>
</head>
<body>

<div class="container">
    <div class="emoji">🎉🍪🎉</div>

    <h1>FREE GIVEAWAY!</h1>

    <div class="reward">$5 Crumbl Gift Card</div>

    <p class="message">
        The first person to text the number below wins a
        <strong>$25 Crumbl Gift Card!</strong>
    </p>

    <a class="phone" href="sms:8018030957">
        Text 801-803-0957
    </a>

    <p class="note">
        First text received wins. Good luck! 🍪
    </p>
</div>

</body>
</html>
