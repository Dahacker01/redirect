<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>$5 Crumbl Gift Card Giveaway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --pink:#ff5ca8;
    --pink-dark:#ff3d93;
    --purple:#7b5cff;
    --dark:#1f2937;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,var(--purple),var(--pink));
    padding:20px;
    color:white;
}

.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:28px;
    padding:32px 24px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.emoji{
    font-size:4rem;
    margin-bottom:10px;
}

.badge{
    display:inline-block;
    background:white;
    color:var(--pink-dark);
    font-weight:700;
    padding:8px 16px;
    border-radius:999px;
    margin-bottom:18px;
    font-size:.9rem;
}

h1{
    font-size:2rem;
    line-height:1.15;
    margin-bottom:12px;
}

.reward{
    font-size:4rem;
    font-weight:800;
    margin:18px 0;
    text-shadow:0 4px 20px rgba(0,0,0,.2);
}

.message{
    font-size:1.05rem;
    line-height:1.6;
    opacity:.95;
    margin-bottom:28px;
}

.cta{
    display:block;
    width:100%;
    background:white;
    color:var(--pink-dark);
    text-decoration:none;
    font-weight:700;
    font-size:1.25rem;
    padding:18px;
    border-radius:18px;
    transition:.2s;
}

.cta:active{
    transform:scale(.98);
}

.note{
    margin-top:18px;
    font-size:.9rem;
    opacity:.85;
}

@media (max-width:480px){
    h1{
        font-size:1.7rem;
    }

    .reward{
        font-size:3.2rem;
    }

    .cta{
        font-size:1.1rem;
        padding:16px;
    }
}
</style>
</head>
<body>

<div class="card">
    <div class="emoji">🍪🎉</div>

    <div class="badge">LIMITED TIME</div>

    <h1>First Person Wins!</h1>

    <div class="reward">$5</div>

    <p class="message">
        The first person to text the number below gets a
        <strong>$5 Crumbl Gift Card</strong>.
    </p>

    <a class="cta" href="sms:8018030957">
        📱 Text 801-803-0957
    </a>

    <p class="note">
        Good luck! 🍪
    </p>
</div>

</body>
</html>
